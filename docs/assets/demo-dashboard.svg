        <text x="390" y="25">Total</text>
        <text x="510" y="25">Input</text>
        <text x="640" y="25">Cached input</text>
        <text x="780" y="25">Output</text>
        <text x="910" y="25">Cache hit</text>
        <text x="1030" y="25">Credits</text>
      </g>
